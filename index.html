<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Juego del Ahorcado Moderno - Un juego clásico con diseño minimalista, efectos de sonido y soporte multilingüe.">
  <title>Ahorcado Moderno | Modern Hangman</title>
  
  <!-- Google Fonts - Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Background Decorative Blurs -->
  <div class="blur-bg bg-1"></div>
  <div class="blur-bg bg-2"></div>

  <div class="game-container">
    <!-- Header -->
    <header class="game-header">
      <div class="header-left">
        <h1 class="logo">AHORCADO<span class="logo-dot">.</span></h1>
      </div>
      <div class="header-right">
        <!-- Stats -->
        <div class="stats-container">
          <div class="stat-badge" id="score-badge">
            <span class="stat-label">Puntos</span>
            <span class="stat-value" id="score-val">0</span>
          </div>
          <div class="stat-badge" id="streak-badge">
            <span class="stat-label">Racha</span>
            <span class="stat-value" id="streak-val">⚡ 0</span>
          </div>
        </div>
        
        <!-- Controls -->
        <div class="header-actions">
          <button id="sound-btn" class="icon-btn" title="Activar/Desactivar sonido" aria-label="Toggle Sound">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" class="icon-svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" class="sound-wave"></path>
            </svg>
          </button>
          
          <button id="lang-btn" class="text-btn" title="Cambiar idioma / Change language">
            <span class="lang-text" id="lang-val">ES</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Main Game Section -->
    <main class="game-layout">
      <!-- Left Column: Visual Scaffold & Hints -->
      <section class="visual-panel">
        <div class="gallows-wrapper">
          <!-- Gallows SVG -->
          <svg class="gallows-svg" viewBox="0 0 200 250" width="100%" height="100%">
            <!-- Gallows Structure (Faint/Background) -->
            <path class="gallows-base" d="M20 230 L180 230" />
            <path class="gallows-pole" d="M60 230 L60 30" />
            <path class="gallows-beam" d="M60 30 L150 30" />
            <path class="gallows-rope" d="M150 30 L150 70" />
            <path class="gallows-brace" d="M60 70 L100 30" />
            
            <!-- Hangman Parts (Hidden by default, shown/animated on error) -->
            <!-- Head -->
            <circle id="hang-head" class="hang-part hang-head" cx="150" cy="88" r="18" />
            <!-- Body -->
            <line id="hang-body" class="hang-part hang-line" x1="150" y1="106" x2="150" y2="160" />
            <!-- Left Arm -->
            <line id="hang-l-arm" class="hang-part hang-line" x1="150" y1="120" x2="120" y2="135" />
            <!-- Right Arm -->
            <line id="hang-r-arm" class="hang-part hang-line" x1="150" y1="120" x2="180" y2="135" />
            <!-- Left Leg -->
            <line id="hang-l-leg" class="hang-part hang-line" x1="150" y1="160" x2="125" y2="205" />
            <!-- Right Leg -->
            <line id="hang-r-leg" class="hang-part hang-line" x1="150" y1="160" x2="175" y2="205" />
            
            <!-- Face details (animated on loss) -->
            <g id="hang-face" class="hang-part-face">
              <!-- Left eye X -->
              <line x1="143" y1="83" x2="147" y2="87" stroke-width="1.5" />
              <line x1="147" y1="83" x2="143" y2="87" stroke-width="1.5" />
              <!-- Right eye X -->
              <line x1="153" y1="83" x2="157" y2="87" stroke-width="1.5" />
              <line x1="157" y1="83" x2="153" y2="87" stroke-width="1.5" />
              <!-- Sad mouth -->
              <path d="M144 96 Q150 91 156 96" fill="none" stroke-width="1.5" />
            </g>
          </svg>
          
          <!-- Remaining Lives counter -->
          <div class="lives-counter" id="lives-display">
            Intentos: <span id="lives-val">6</span>/6
          </div>
        </div>
      </section>

      <!-- Right Column: Interactive Word & Keyboard -->
      <section class="control-panel">
        <!-- Category & Hint Display -->
        <div class="info-card">
          <div class="category-header">
            <span class="category-label" id="category-tag">Categoría</span>
            <span class="category-name" id="category-val">TECNOLOGÍA</span>
          </div>
          <div class="hint-container">
            <button id="hint-btn" class="hint-toggle-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
              </svg>
              <span id="hint-btn-text">Ver pista (Cuesta 5 puntos)</span>
            </button>
            <p id="hint-text" class="hint-text hidden"></p>
          </div>
        </div>

        <!-- Secret Word Blanks -->
        <div class="word-display" id="word-container">
          <!-- Dynamically populated letters -->
        </div>

        <!-- Virtual Keyboard -->
        <div class="keyboard-container" id="keyboard">
          <!-- Dynamically populated buttons -->
        </div>

        <!-- Desktop keyboard tip -->
        <div class="keyboard-tip">
          <span id="tip-text">Puedes usar el teclado físico de tu computadora.</span>
        </div>
      </section>
    </main>

    <!-- Footer / Reset Control -->
    <footer class="game-footer">
      <button id="reset-btn" class="primary-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
        </svg>
        <span id="reset-btn-text">Nueva Palabra</span>
      </button>
    </footer>
  </div>

  <!-- End Game Overlay (Modal) -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-content glass-card">
      <div id="modal-decor" class="modal-decor-win"></div>
      <h2 id="modal-title" class="modal-title">¡Victoria!</h2>
      <p id="modal-message" class="modal-message">¡Increíble! Adivinaste la palabra correctamente.</p>
      
      <div class="modal-stats">
        <div class="modal-stat">
          <span class="modal-stat-label">La palabra era</span>
          <span id="modal-correct-word" class="modal-word-reveal">INTERNET</span>
        </div>
        <div class="modal-stat-row">
          <div class="modal-stat">
            <span class="modal-stat-label">Puntos obtenidos</span>
            <span id="modal-points-gained" class="modal-stat-val">+10</span>
          </div>
          <div class="modal-stat">
            <span class="modal-stat-label">Racha actual</span>
            <span id="modal-streak" class="modal-stat-val">⚡ 3</span>
          </div>
        </div>
      </div>
      
      <button id="modal-play-btn" class="primary-btn pulse">
        <span id="modal-play-text">Jugar de nuevo</span>
      </button>
    </div>
  </div>

  <!-- Canvas for Confetti/Success animations -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Script files -->
  <script type="module" src="app.js"></script>
</body>
</html>
